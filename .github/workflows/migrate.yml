name: Supabase Migrations

on:
  push:
    branches: [main, staging]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migrate.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only (do not apply)'
        type: boolean
        default: false
      environment:
        description: 'Target environment (auto-detected from branch if omitted)'
        type: choice
        options:
          - auto
          - staging
          - production
        default: auto

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve target environment
        id: env
        run: |
          # Manual dispatch can override; otherwise detect from branch
          INPUT_ENV="${{ inputs.environment || 'auto' }}"
          if [ "$INPUT_ENV" = "auto" ] || [ "$INPUT_ENV" = "" ]; then
            BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH="$INPUT_ENV"
          fi

          case "$BRANCH" in
            main|production)
              echo "name=production" >> "$GITHUB_OUTPUT"
              echo "project_ref=rnspxmrkpoukccahggli" >> "$GITHUB_OUTPUT"
              echo "label=PRODUCTION" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "name=staging" >> "$GITHUB_OUTPUT"
              echo "project_ref=${{ secrets.SUPABASE_STAGING_PROJECT_REF }}" >> "$GITHUB_OUTPUT"
              echo "label=STAGING" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Set database password
        run: |
          if [ "${{ steps.env.outputs.name }}" = "production" ]; then
            echo "SUPABASE_DB_PASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }}" >> "$GITHUB_ENV"
          else
            echo "SUPABASE_DB_PASSWORD=${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}" >> "$GITHUB_ENV"
          fi

      - name: Link Supabase project (${{ steps.env.outputs.label }})
        run: |
          echo "::notice::Targeting ${{ steps.env.outputs.label }} (ref: ${{ steps.env.outputs.project_ref }})"
          supabase link --project-ref "${{ steps.env.outputs.project_ref }}"

      - name: Repair manually-applied migrations
        if: steps.env.outputs.name == 'production'
        run: |
          # Migrations applied via Dashboard SQL Editor aren't tracked by CLI.
          # Mark all known-applied migrations so db push only runs truly new ones.
          # This list is maintained manually — add the version number when you
          # apply a migration via Dashboard.
          #
          # NOTE: Staging doesn't need this — all migrations are applied via CLI.
          APPLIED_MIGRATIONS=(
            00001 00002 00003 00004 00005
            00006 00007 00008 00009 00010 00011
            00012 00013 00014 00015
            00016 00017 00018 00019 00020 00021 00022
            00023 00024
          )
          for v in "${APPLIED_MIGRATIONS[@]}"; do
            supabase migration repair --status applied "$v" 2>/dev/null || true
          done
          echo "Repaired ${#APPLIED_MIGRATIONS[@]} manually-applied migrations"

      - name: Show migration status
        run: supabase migration list

      - name: Preview pending migrations (dry run)
        if: inputs.dry_run == true
        run: |
          echo "=== Dry run — showing what would be applied ==="
          supabase db push --dry-run

      - name: Apply pending migrations
        if: inputs.dry_run != true
        run: |
          echo "=== Applying to ${{ steps.env.outputs.label }} ==="
          supabase db push
