name: Supabase Migrations

# Applies migrations via the Supabase Management API.
# Only requires SUPABASE_ACCESS_TOKEN — no DB password needed.
# This eliminates the #1 cause of CI failures (password drift).

on:
  push:
    branches: [main, staging]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/db-migrate-api.sh'
      - '.github/workflows/migrate.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only (do not apply)'
        type: boolean
        default: false
      environment:
        description: 'Target environment (auto-detected from branch if omitted)'
        type: choice
        options:
          - auto
          - staging
          - production
        default: auto

# Only one migration job per branch at a time. Queue, don't cancel.
concurrency:
  group: migrate-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target environment
        id: env
        run: |
          INPUT_ENV="${{ inputs.environment || 'auto' }}"
          if [ "$INPUT_ENV" = "auto" ] || [ "$INPUT_ENV" = "" ]; then
            BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH="$INPUT_ENV"
          fi

          case "$BRANCH" in
            main|production)
              echo "name=production" >> "$GITHUB_OUTPUT"
              echo "label=PRODUCTION" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "name=staging" >> "$GITHUB_OUTPUT"
              echo "label=STAGING" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Apply migrations (Management API)
        run: |
          chmod +x ./scripts/db-migrate-api.sh

          TARGET_FLAG="--staging"
          if [ "${{ steps.env.outputs.name }}" = "production" ]; then
            TARGET_FLAG="--prod"
          fi

          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          ./scripts/db-migrate-api.sh $TARGET_FLAG $DRY_RUN_FLAG --ci

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABEL="${{ steps.env.outputs.label }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Create a GitHub issue for visibility
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Migration failed on $LABEL ($SHORT_SHA)" \
            --body "**Branch:** \`${{ github.ref_name }}\`
          **Commit:** \`$SHORT_SHA\` — $COMMIT_MSG
          **Workflow run:** $RUN_URL

          Check the workflow logs for the exact SQL error.

          ---
          *Auto-created by CI on migration failure.*" \
            --label "bug" \
          || echo "::warning::Could not create GitHub issue (check token permissions)"
