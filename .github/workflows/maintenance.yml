name: Weekly Maintenance

on:
  schedule:
    # Every Friday at 9am CT (14:00 UTC) — end-of-week check
    - cron: '0 14 * * 5'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build check
        run: npm run build

      - name: Security audit
        run: |
          AUDIT=$(npm audit --json 2>/dev/null || true)
          HIGH=$(echo "$AUDIT" | python3 -c "import sys,json; d=json.load(sys.stdin); v=d.get('metadata',{}).get('vulnerabilities',{}); print(v.get('high',0)+v.get('critical',0))" 2>/dev/null || echo "0")
          echo "High/critical vulnerabilities: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::$HIGH high/critical vulnerabilities found — run npm audit for details"
          fi

      - name: Token compliance check
        run: |
          if [ -x ./scripts/token-audit.sh ]; then
            ./scripts/token-audit.sh || echo "::warning::Token compliance violations found"
          fi

      - name: Portal health check
        run: |
          RESPONSE=$(curl -sf --max-time 10 "https://portal.brikdesigns.com/api/health" 2>/dev/null || echo '{"status":"unreachable"}')
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "Portal status: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "::error::Portal health check failed: $STATUS"
          fi

      - name: BDS submodule freshness
        run: |
          cd brik-bds
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git ls-remote origin HEAD | cut -f1)
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "BDS submodule is up to date"
          else
            echo "::warning::BDS submodule is behind — run ./scripts/bds-sync.sh"
            echo "  Local:  $LOCAL"
            echo "  Remote: $REMOTE"
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly maintenance check failed — ${new Date().toISOString().split('T')[0]}`,
              body: `## Maintenance failure\n\nThe weekly maintenance workflow failed. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nCommon causes:\n- Build failure\n- Lint errors\n- Security vulnerabilities\n- Token compliance violations`,
              labels: ['maintenance'],
            });
